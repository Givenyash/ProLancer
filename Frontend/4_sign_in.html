<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
        }

        .login-container{
            width: 100%;
        }
        .logo{
            text-align: center;
            color: #1dbf73;
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .login-box{
            width: 400px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .login-box input[type="email"], .login-box input[type = "password"]{
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
        }

        .remember{
            margin-bottom: 20px;
        }

        .login-box button{
            width: 100%;
            padding: 15px;
            border: none;
            background: #1dbf73;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fa-solid fa-rocket"></i>
            ProLancer
        </div>

        <div class="login-box">
            <h1>Welcome Back</h1>
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="password" required>

            <div class="remember">
                <input type="checkbox">
                <span>Remember Me</span>
            </div>

            <button>Sign in</button>

            <p>
                New To ProLancer?
                <a href="join.html">Join Now</a>
            </p>
        </div>

    </div>

</body>
</html>

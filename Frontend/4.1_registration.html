<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Register | ProLancer</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f5f5f5;

        font-family: Arial, Helvetica, sans-serif;
      }

      .container {
        height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;
      }

      .register-box {
        width: 420px;

        background: white;

        padding: 35px;

        border-radius: 10px;

        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1);
      }

      .register-box h2 {
        text-align: center;

        margin-bottom: 10px;
      }

      .register-box p {
        text-align: center;

        color: gray;

        margin-bottom: 25px;
      }

      #message {
        margin-bottom: 15px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="register-box">
        <h2>Create Account</h2>

        <p id="roleText"></p>

        <div id="message"></div>

        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label">Full Name</label>

            <input type="text" class="form-control" id="name" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>

            <input type="email" class="form-control" id="email" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>

            <input
              type="password"
              class="form-control"
              id="password"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Confirm Password</label>

            <input
              type="password"
              class="form-control"
              id="confirmPassword"
              required
            />
          </div>

          <button class="btn btn-success w-100" type="submit">
            Create Account
          </button>
        </form>

        <div class="text-center mt-3">
          Already have an account?

          <a href="4_sign_in.html"> Sign In </a>
        </div>
      </div>
    </div>

    <script src="4.1_registration.js"></script>
  </body>
</html>
